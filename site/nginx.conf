server {
    listen 8000;
    server_name _;
    root /var/www/kodiak;
    index index.html;

    # Match the old Rails routes
    location = /Contact {
        try_files /contact.html =404;
    }
    location = /AboutUs {
        try_files /about.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
